services:
  cam-pi:
    build: .
    container_name: cam-pi-gate
    restart: unless-stopped
    network_mode: host
    ports:
      - "8000:8000"
    volumes:
      - /data/cam-pi:/data/cam-pi
      - ./config:/app/config:ro
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiomem0:/dev/gpiomem0
    privileged: true
    cap_add:
      - SYS_RAWIO
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
